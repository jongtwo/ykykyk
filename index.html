        ].map(m => (
          <div key={m.label} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 0', borderBottom: '1px solid #f5f5f5', cursor: 'pointer' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 18 }}>{m.icon}</span>
              <span style={{ fontSize: 15, fontWeight: 500 }}>{m.label}</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              {m.badge && <span style={{ fontSize: 13, color: '#888' }}>{m.badge}</span>}
              <ChevronRight />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── APP ROOT ───────────────────────────────────────────────────────────────
const App = () => {
  const [tab, setTab] = useState('map');
  const [screen, setScreen] = useState(null); // { type: 'detail', id: N }

  const handleSetTab = (t) => {
    setScreen(null);
    setTab(t);
  };

  const goBack = () => setScreen(null);

  return (
    <div style={{ position: 'relative', width: '100%', height: '100%' }}>
      {/* Main screens */}
      {!screen && tab === 'map' && <MapScreen setScreen={setScreen} />}
      {!screen && tab === 'tok' && <TokScreen />}
      {!screen && tab === 'mypage' && <MyPage setScreen={setScreen} />}

      {/* Detail overlay */}
      {screen?.type === 'detail' && <DetailScreen rid={screen.id} goBack={goBack} />}

      {/* Bottom nav (always visible unless on detail) */}
      {!screen && <BottomNav active={tab} setTab={handleSetTab} />}
      {screen && (
        <div style={{ position: 'fixed', bottom: 0, left: '50%', transform: 'translateX(-50%)', width: '100%', maxWidth: 390, height: 80, background: '#fff', borderTop: '1px solid #e8e8e8', display: 'flex', alignItems: 'flex-start', paddingTop: 10, zIndex: 100 }}>
          {[
            { id: 'map', label: '버티맵', Icon: MapIcon },
            { id: 'tok', label: '버티톡', Icon: GiftIcon },
            { id: 'mypage', label: '버티자', Icon: PersonIcon },
          ].map(({ id, label, Icon }) => (
            <div key={id} onClick={() => handleSetTab(id)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, cursor: 'pointer', padding: 4 }}>
              <Icon active={tab === id} />
              <span style={{ fontSize: 10, fontWeight: tab === id ? 700 : 500, color: tab === id ? '#2D6A2D' : '#999' }}>{label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
